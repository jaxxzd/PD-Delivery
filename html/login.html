<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Preload da imagem no body pra evitar flash branco -->
    <link rel="preload" as="image" href="/Images/background-pages-aut.webp" type="image/webp">
    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">

    <!-- ICONS | lucide/Font Awesome -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>PD Delivery | Login</title>
</head>

<body class="body-auth">
    <header class="header-auth">
        <a href="/index.html">
            <button class="btn-header" id="btn-back-login">
                VOLTAR
            </button>
        </a>
        <a href="/html/register.html">
            <button class="btn-header" id="btn-create-account">
                CRIAR CONTA
            </button>
        </a>
    </header>

    <main class="main-auth">
        <div id="container-card-login">
            <figure>
                <img src="/Images/logo-PD-Delivery-Black.png" alt="Logo do PD Delivery"
                    class="logo-pd-delivery-card-auth">
                <figcaption>Logo do PD Delivery</figcaption>
            </figure>

            <div id="container-info-card-login">
                <h2 class="title-card-auth">
                    FAZER LOGIN em PD Delivery
                </h2>
                <p class="desc-card-auth">
                    Faça login no PD Delivery para ofertas vantajosas e desfrutar da melhor forma os nossos produtos de
                    alta
                    qualidade!
                </p>
            </div>

            <div class="box-input">
                <label for="email-login" class="label-auth">EMAIL</label>
                <div class="container-input">
                    <input type="email" class="input-field" id="email-login" placeholder="nome@exemplo.com" required
                        autocomplete="off">
                </div>
            </div>

            <div class="box-input">
                <label for="password-login" class="label-auth">SENHA</label>
                <div class="container-input">
                    <input type="password" class="input-field" id="password-login" placeholder="Senha" required
                        autocomplete="off">
                    <div class="container-icon-eye">
                        <i data-lucide="eye" id="eye-open"></i>
                    </div>
                </div>
            </div>

            <button id="btn-login">
                FAZER LOGIN
            </button>
        </div>
    </main>
</body>

<script type="module" src="/js/api.js"></script>
<script type="module" src="/js/aut.js"></script>
<script type="module" src="/js/route.js"></script>
<script type="module" src="/js/formValidation.js"></script>
<script src="/js/lucide-icons.js"></script>

</html>
