<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- ICONS | lucide/Font Awesome -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>PD Delivery | Home</title>
</head>

<body id="body-index">
    <header id="header-delivery">
        <nav id="nav-delivery">
            <div id="container-logo-delivery">
                <figure>
                    <img src="Images/logo-PD-Delivery.png" alt="Logo do PD Delivery" id="logo-header-delivery">
                    <figcaption>Logo do PD Delivery</figcaption>
                </figure>
            </div>

            <div id="search-input-delivery">
                <i data-lucide="search" id="icon-search"></i>
                <input type="text" placeholder="Buscar..." id="input-search-delivery">
            </div>

            <ul id="list-desordened-delivery">
                <li><a href="index.html">INÍCIO</a></li>
                <li><a href="index.html">CARDÁPIO</a></li>
                <li><a href="index.html">FAZER LOGIN</a></li>
            </ul>

            <div id="container-cart-delivery">
                <a href="html/cart.html" id="link-cart-delivery">
                    <i data-lucide="handbag" id="icon-handbag"></i>
                </a>
                <span id="cart-value">R$ 00,00</span>
                <span id="cart-quantity">0</span>
            </div>

            <div id="container-user">
                <i data-lucide="user-round" id="icon-user"></i>
            </div>

            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" color="#FFFFFF" stroke-linecap="round" stroke-linejoin="round"
                class="icon icon-tabler icons-tabler-outline icon-tabler-menu-deep">
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M4 6h16" />
                <path d="M7 12h13" />
                <path d="M10 18h10" />
            </svg>
        </nav>
    </header>
</body>
<script src="js/lucide-icons.js"></script>

</html>
